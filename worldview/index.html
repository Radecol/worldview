<div id="wv-root" style="max-width: 420px; margin: 0 auto; background: #1a1a1a; border-radius: 20px; padding: 16px; font-family: var(--font-sans); color: #e8e8e8;">
  <div style="display: flex; justify-content: space-around; padding: 8px 0 12px; font-size: 18px; color: #888;">
    <span>💡</span><span>📊</span><span>❓</span><span>⚙</span>
  </div>

  <div id="stage" style="background: #0a0a0a; border-radius: 8px; aspect-ratio: 1; position: relative; overflow: hidden; margin-bottom: 12px;">
    <svg id="stageSvg" viewBox="0 0 400 400" style="width:100%; height:100%;"></svg>
  </div>

  <div id="debug" style="font-size:11px; color:#888; padding:4px 8px; min-height:14px; font-family:monospace;">loading puzzle…</div>

  <div id="stack" style="background: #f5f5f5; color: #222; border-radius: 6px; padding: 0; font-size: 14px; overflow: hidden;">
    <div id="openingClueRow" style="padding: 10px 14px; font-weight: 500; border-bottom: 1px dashed #ccc;"></div>
  </div>

  <div id="attempts" style="display:flex; justify-content:center; gap:8px; padding: 14px 0 10px;">
    <span class="dot" style="width:8px; height:8px; border-radius:50%; background:#e8e8e8;"></span>
    <span class="dot" style="width:8px; height:8px; border-radius:50%; background:#e8e8e8;"></span>
    <span class="dot" style="width:8px; height:8px; border-radius:50%; background:#e8e8e8;"></span>
  </div>

  <div style="display:flex; gap:8px;">
    <button id="btnClue" style="flex:1; background:#fff; color:#222; border:none; border-radius:20px; padding:10px; font-weight:500; cursor:pointer;">Clue (2)</button>
    <button id="btnWww" style="flex:1; background:#fff; color:#222; border:none; border-radius:20px; padding:10px; font-weight:500; cursor:pointer;">WWW (1)</button>
    <button id="btnReveal" style="flex:1; background:#fff; color:#222; border:none; border-radius:20px; padding:10px; font-weight:500; cursor:pointer;">Reveal (2)</button>
  </div>

  <div id="endScreen" style="display:none; text-align:center; padding: 16px 0 4px;">
    <div id="scoreLine" style="font-size: 18px; font-weight: 500;"></div>
    <div style="font-size: 12px; color: #888; margin-top: 6px;">Tap any filled line to read its story</div>
  </div>
</div>

<div id="storyPanel" style="max-width:420px; margin: 12px auto 0; display:none; background:#fff; color:#222; border-radius:8px; padding: 14px 16px; font-family: var(--font-sans);">
  <div id="storyTitle" style="font-weight:500; margin-bottom:6px;"></div>
  <div id="storyBody" style="font-size:14px; line-height:1.5;"></div>
</div>

<script>
(async function(){
  const PUZZLE_URL = "puzzles/043.json"; // change this to load a different puzzle

  const GLOBAL_JUDGE_PROMPT = `You are the answer judge for WorldView, a daily puzzle game. Decide if a player's guess should count as correct.

Be generous. Reward recognition, not pedantry. If a reasonable person would understand the player means the answer, accept it.

Accept: nicknames, titles, partial names that clearly point to the answer (Princess of Wales → Princess Diana; Mandela → Nelson Mandela; Lady Di → Princess Diana), alternate spellings, minor typos.

Reject: genuinely different entities (Diana Ross), wrong specific answers (Prince Charles), or anything the per-puzzle hints say to reject.

Use "close" only when missing a critical qualifier (e.g. "War" for "Cold War").

Return ONLY JSON: {"verdict":"correct"|"close"|"incorrect","reason":"one sentence"}`;

  const dbg = document.getElementById('debug');
  function log(msg) { dbg.textContent = msg; }

  // ---- Load puzzle ----
  let puzzle;
  try {
    const res = await fetch(PUZZLE_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    puzzle = await res.json();
    log('');
  } catch (err) {
    log('failed to load puzzle: ' + err.message);
    return;
  }

  // ---- Build stage SVG from puzzle ----
  const svg = document.getElementById('stageSvg');
  const allCircles = [puzzle.openingReveal, ...puzzle.reveals];
  const maskCircles = allCircles.map((c, i) =>
    `<circle id="c${i}" cx="${c.cx}" cy="${c.cy}" r="${c.r}" fill="white" opacity="${i === 0 ? 1 : 0}"/>`
  ).join('');
  svg.innerHTML = `
    <defs>
      <mask id="circleMask">
        <rect width="400" height="400" fill="black"/>
        ${maskCircles}
      </mask>
    </defs>
    <image href="${puzzle.image}" width="400" height="400" preserveAspectRatio="xMidYMid slice" mask="url(#circleMask)"/>
  `;
  const circles = allCircles.map((_, i) => document.getElementById('c' + i));

  // ---- Build stack ----
  document.getElementById('openingClueRow').textContent = puzzle.openingClue;
  const stack = document.getElementById('stack');
  for (let i = 1; i <= 8; i++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.dataset.line = i;
    row.style.cssText = 'display:flex; align-items:center; padding: 0 14px; height: 40px;' + (i < 8 ? ' border-bottom: 1px dashed #ccc;' : '');
    row.innerHTML = `<span class="num" style="width: 20px; font-weight:500; color:${i === 1 ? '#222' : '#aaa'};">${i}</span><span class="content" style="flex:1;"></span>`;
    stack.appendChild(row);
  }

  // ---- Game state ----
  const state = { currentLine: 1, attempts: 3, cluesUsed: 0, revealsUsed: 0, wwwUsed: false, ended: false, filled: {}, judging: false };

  function renderSolveRow() {
    if (state.ended || state.currentLine > 8) return;
    const row = document.querySelector(`.row[data-line="${state.currentLine}"]`);
    row.style.border = '2px solid #7cb342';
    row.style.background = '#fff';
    row.querySelector('.num').style.color = '#222';
    const c = row.querySelector('.content');
    c.innerHTML = `<input type="text" placeholder="Solve It…" style="width:100%; border:none; outline:none; background:transparent; font-size:14px; font-family:inherit; color:#222;" />`;
    const input = c.querySelector('input');
    input.focus();
    input.addEventListener('keydown', async function(e) {
      if (e.key === 'Enter' && input.value.trim() && !state.judging) {
        state.judging = true;
        const guess = input.value.trim();
        input.disabled = true;
        input.value = guess + ' … judging';
        await handleGuess(guess);
        state.judging = false;
      }
    });
  }

  function fillLine(line, html, data) {
    const row = document.querySelector(`.row[data-line="${line}"]`);
    row.style.border = '';
    row.style.background = '';
    row.querySelector('.num').style.color = '#222';
    row.querySelector('.content').innerHTML = html;
    state.filled[line] = data;
  }

  function advance() {
    state.currentLine++;
    if (state.currentLine > 8) endGame(false);
    else renderSolveRow();
  }

  async function judgeGuess(guess) {
    log('calling judge…');
    try {
      const response = await fetch("/.netlify/functions/judge", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 200,
          messages: [{
            role: "user",
            content: `${GLOBAL_JUDGE_PROMPT}\n\nAnswer: ${puzzle.answer}\nHints: ${puzzle.judgeHints}\n\nGuess: "${guess}"\n\nReturn JSON now.`
          }]
        })
      });
      log('status: ' + response.status);
      if (!response.ok) {
        const errText = await response.text();
        log('API error ' + response.status + ': ' + errText.slice(0, 80));
        return { verdict: "error", reason: "judge api failed (" + response.status + ")" };
      }
      const data = await response.json();
      const text = data.content.filter(c => c.type === 'text').map(c => c.text).join('');
      log('judge said: ' + text.slice(0, 60));
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) return { verdict: "error", reason: "no json in response" };
      return JSON.parse(match[0]);
    } catch (err) {
      log('exception: ' + err.message);
      return { verdict: "error", reason: err.message };
    }
  }

  async function handleGuess(g) {
    const verdict = await judgeGuess(g);
    if (verdict.verdict === "error") {
      const row = document.querySelector(`.row[data-line="${state.currentLine}"]`);
      const c = row.querySelector('.content');
      c.innerHTML = `<input type="text" value="${g}" style="width:100%; border:none; outline:none; background:transparent; font-size:14px; font-family:inherit; color:#c00;" />`;
      const input = c.querySelector('input');
      input.focus();
      input.select();
      input.addEventListener('keydown', async function(e) {
        if (e.key === 'Enter' && input.value.trim() && !state.judging) {
          state.judging = true;
          const guess = input.value.trim();
          input.disabled = true;
          input.value = guess + ' … judging';
          await handleGuess(guess);
          state.judging = false;
        }
      });
      return;
    }
    if (verdict.verdict === "correct") {
      fillLine(state.currentLine, g, { label: g, story: puzzle.finalStory });
      const row = document.querySelector(`.row[data-line="${state.currentLine}"]`);
      row.style.background = '#7cb342';
      row.querySelector('.num').style.color = '#fff';
      row.querySelector('.content').style.color = '#fff';
      endGame(true);
    } else if (verdict.verdict === "close") {
      const row = document.querySelector(`.row[data-line="${state.currentLine}"]`);
      const c = row.querySelector('.content');
      c.innerHTML = `<input type="text" placeholder="So close — try again" style="width:100%; border:none; outline:none; background:transparent; font-size:14px; font-family:inherit; color:#d97706;" />`;
      const input = c.querySelector('input');
      input.focus();
      input.addEventListener('keydown', async function(e) {
        if (e.key === 'Enter' && input.value.trim() && !state.judging) {
          state.judging = true;
          const guess = input.value.trim();
          input.disabled = true;
          input.value = guess + ' … judging';
          await handleGuess(guess);
          state.judging = false;
        }
      });
    } else {
      fillLine(state.currentLine, `<s>${g}</s>`, { label: g, story: verdict.reason || "A wrong guess." });
      state.attempts--;
      document.querySelectorAll('.dot')[state.attempts].style.background = '#444';
      if (state.attempts === 0) endGame(false);
      else advance();
    }
  }

  document.getElementById('btnClue').onclick = function() {
    if (state.ended || state.cluesUsed >= 2) return;
    const clue = puzzle.clues[state.cluesUsed];
    fillLine(state.currentLine, clue.text, { label: clue.text, story: clue.story });
    state.cluesUsed++;
    this.textContent = `Clue (${2 - state.cluesUsed})`;
    if (state.cluesUsed >= 2) this.style.opacity = '0.4';
    advance();
  };

  document.getElementById('btnReveal').onclick = function() {
    if (state.ended || state.revealsUsed >= 2) return;
    circles[state.revealsUsed + 1].setAttribute('opacity', '1');
    fillLine(state.currentLine, '<em style="color:#666;">Image Reveal</em>', { label: 'Image Reveal', story: 'A new region of the photograph was exposed.' });
    state.revealsUsed++;
    this.textContent = `Reveal (${2 - state.revealsUsed})`;
    if (state.revealsUsed >= 2) this.style.opacity = '0.4';
    advance();
  };

  document.getElementById('btnWww').onclick = function() {
    if (state.ended || state.wwwUsed) return;
    let text;
    if (state.currentLine <= 2) text = puzzle.www.early;
    else if (state.currentLine <= 4) text = puzzle.www.mid;
    else text = puzzle.www.late;
    fillLine(state.currentLine, text, { label: 'WWW', story: 'Answer-shape hint.' });
    state.wwwUsed = true;
    this.textContent = 'WWW (0)';
    this.style.opacity = '0.4';
    advance();
  };

  function showStory(line) {
    const d = state.filled[line];
    if (!d || !d.story) return;
    document.getElementById('storyPanel').style.display = 'block';
    document.getElementById('storyTitle').textContent = d.label;
    document.getElementById('storyBody').textContent = d.story;
  }

  function endGame(won) {
    state.ended = true;
    circles.forEach(c => { c.setAttribute('cx', '200'); c.setAttribute('cy', '200'); c.setAttribute('r', '400'); c.setAttribute('opacity', '1'); });
    Object.keys(state.filled).forEach(line => {
      const row = document.querySelector(`.row[data-line="${line}"]`);
      row.style.cursor = 'pointer';
      row.onclick = () => showStory(line);
    });
    document.getElementById('endScreen').style.display = 'block';
    document.getElementById('scoreLine').textContent = won
      ? `WORLDVIEW #${puzzle.id} in ${state.currentLine}`
      : `WORLDVIEW #${puzzle.id} X — answer: ${puzzle.answer}`;
    ['btnClue','btnWww','btnReveal'].forEach(id => document.getElementById(id).style.opacity = '0.4');
  }

  renderSolveRow();
})();
</script>
